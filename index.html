<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENT Training Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .star-rating { direction: rtl; display: inline-flex; }
        .star-rating input { display: none; }
        .star-rating label { color: #ddd; font-size: 2.5rem; cursor: pointer; transition: 0.2s; }
        .star-rating label:hover, .star-rating label:hover ~ label,
        .star-rating input:checked ~ label { color: #ef4444; }
        .quiz-option { cursor: pointer; transition: 0.2s; border: 2px solid #e2e8f0; }
        .quiz-option:hover { border-color: #3b82f6; background-color: #f8fafc; }
        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900">
        <div class="bg-white p-10 rounded-[40px] shadow-2xl w-full max-w-md text-center border-4 border-blue-500">
            <div class="text-6xl mb-4">🎓</div>
            <h2 class="text-3xl font-black text-slate-800 uppercase italic">ENT Learning</h2>
            <p class="text-slate-500 mt-2 mb-8 font-bold italic underline text-sm">ศูนย์เรียนรู้บริษัท เอ็นเตอร์ไพรส์ เน็ตเวอร์คฯ</p>
            <div class="text-left mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2 italic">กรุณาใส่ชื่อเล่นของคุณ:</label>
                <input type="text" id="nickname-input" placeholder="ตัวอย่าง: ก้อง" 
                       class="w-full px-5 py-4 border-2 rounded-2xl outline-none focus:border-blue-600 shadow-inner font-bold text-lg">
            </div>
            <div class="space-y-3">
                <button onclick="handleLogin('pre')" class="w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-black rounded-2xl shadow-lg transition duration-300 text-xl italic underline">
                    📝 ทำ Pre-test (15 ข้อ)
                </button>
                <button onclick="handleLogin('main')" class="w-full py-4 bg-blue-600 hover:bg-blue-800 text-white font-bold rounded-2xl shadow-lg transition duration-300 text-xl italic underline">
                    📖 เข้าเรียน / Post-test
                </button>
            </div>
        </div>
    </div>

    <div id="pre-test-screen" class="hidden container mx-auto max-w-3xl p-6 py-12">
        <div class="bg-yellow-500 text-slate-900 p-8 rounded-t-[40px] shadow-xl text-center">
            <h2 class="text-3xl font-black italic underline">📝 Pre-test ก่อนเรียน (15 ข้อ)</h2>
            <p class="font-bold mt-2">วัดความรู้เดิมก่อนเข้าสู่บทเรียน</p>
        </div>
        <div id="pre-quiz-list" class="bg-white p-8 rounded-b-[40px] shadow-2xl space-y-8 border-x-2 border-b-2"></div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white border-b sticky top-0 z-20 px-6 py-4 flex justify-between items-center shadow-md">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-700 text-white px-4 py-1 rounded-xl font-black">ENT</div>
            </div>
            <div class="text-sm font-bold bg-blue-50 px-4 py-2 rounded-full border border-blue-200">
                👤 พนักงาน: <span id="display-name" class="text-blue-700 underline"></span>
            </div>
        </nav>

        <main class="container mx-auto max-w-6xl p-6 pb-24">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
                <div class="lg:col-span-2 space-y-4">
                    <div class="bg-white rounded-[40px] shadow-xl border-2 border-blue-100 p-10 text-center flex flex-col items-center justify-center min-h-[400px]">
                        <div class="bg-red-50 p-6 rounded-full mb-6"><span class="text-7xl">🎬</span></div>
                        <h3 class="text-2xl font-black text-slate-800 italic underline" id="v-title">เลือกวิดีโอเพื่อเริ่มเรียนรู้</h3>
                        <a id="v-link" href="#" target="_blank" class="hidden mt-6 inline-flex items-center bg-red-600 hover:bg-red-700 text-white px-10 py-5 rounded-[25px] font-black text-xl shadow-2xl transition-all transform hover:scale-105 italic underline">▶️ คลิกเพื่อดูวิดีโอ</a>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                        <button onclick="updateV('https://youtu.be/9uXk9eaYK3A', '01. วัตถุประสงค์การอบรม', this)" class="v-btn bg-white p-4 rounded-2xl font-bold text-sm italic shadow border-2 border-transparent hover:border-blue-400">01. วัตถุประสงค์</button>
                        <button onclick="updateV('https://youtu.be/izsVh0eVgUU', '02. กฎระเบียบของบริษัท', this)" class="v-btn bg-white p-4 rounded-2xl font-bold text-sm italic shadow border-2 border-transparent hover:border-blue-400">02. กฎระเบียบ</button>
                        <button onclick="updateV('https://youtu.be/51gSwOnzXkU', '03. สิทธิตามกฎหมายแรงงาน', this)" class="v-btn bg-white p-4 rounded-2xl font-bold text-sm italic shadow border-2 border-transparent hover:border-blue-400">03. สิทธิตามกฎหมาย</button>
                        <button onclick="updateV('https://youtu.be/ipBgPXXTx2w', '04. สวัสดิการพนักงาน', this)" class="v-btn bg-white p-4 rounded-2xl font-bold text-sm italic shadow border-2 border-transparent hover:border-blue-400">04. สวัสดิการ</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-black text-slate-800 italic underline flex items-center">📁 เอกสารประกอบ</h3>
                    <div class="space-y-2 max-h-[250px] overflow-y-auto">
                        <button onclick="openPDF('https://drive.google.com/file/d/1t7WdRCPOXD-jxUMbj-tAr_4oaWl6BgNA/preview')" class="w-full text-left p-4 bg-white border-2 rounded-2xl font-bold text-xs hover:border-blue-500 shadow-sm">📄 01. วัตถุประสงค์.pdf</button>
                        <button onclick="openPDF('https://drive.google.com/file/d/1afnPyYVH7VChPAoXosoMVGWqyUh2C1OC/preview')" class="w-full text-left p-4 bg-white border-2 rounded-2xl font-bold text-xs hover:border-blue-500 shadow-sm">📄 02. กฎระเบียบ.pdf</button>
                        <button onclick="openPDF('https://drive.google.com/file/d/1NFC6MhQ3aLeZee8EUNzlUiqYMzlNEsZ0/preview')" class="w-full text-left p-4 bg-white border-2 rounded-2xl font-bold text-xs hover:border-blue-500 shadow-sm">📄 03. กฎหมายแรงงาน.pdf</button>
                        <button onclick="openPDF('https://drive.google.com/file/d/1mBDaUNlpSA--kDlM7qDrDmshRtKq1x0t/preview')" class="w-full text-left p-4 bg-white border-2 rounded-2xl font-bold text-xs hover:border-blue-500 shadow-sm">📄 04. สวัสดิการพนักงาน.pdf</button>
                        <button onclick="openPDF('https://drive.google.com/file/d/1Vwy_HeX6J9Ad5M--xwAKxA0wKaTRBJ0U/preview')" class="w-full text-left p-4 bg-white border-2 rounded-2xl font-bold text-xs hover:border-blue-500 shadow-sm">📄 05. ORIENTATION NEW-EMPLOYEE 2026.pdf</button>
                    </div>
                    <div class="bg-yellow-400 p-4 rounded-[25px] border-2 border-yellow-600 text-center">
                        <p class="font-black text-[10px] uppercase">ประเมินความพึงพอใจ</p>
                        <div class="star-rating"><input type="radio" id="5-s" name="r" onclick="document.getElementById('rt').innerText='ดีมาก'"><label for="5-s">★</label><input type="radio" id="4-s" name="r" onclick="document.getElementById('rt').innerText='ดี'"><label for="4-s">★</label><input type="radio" id="3-s" name="r" onclick="document.getElementById('rt').innerText='พอใช้'"><label for="3-s">★</label><input type="radio" id="2-s" name="r" onclick="document.getElementById('rt').innerText='ปรับปรุง'"><label for="2-s">★</label><input type="radio" id="1-s" name="r" onclick="document.getElementById('rt').innerText='แย่'"><label for="1-s">★</label></div>
                        <p id="rt" class="font-bold text-blue-900 text-xs h-4"></p>
                    </div>
                </div>
            </div>

            <div class="max-w-4xl mx-auto">
                <div class="bg-blue-800 text-white p-8 rounded-t-[40px] shadow-xl text-center border-b-4 border-yellow-400">
                    <h2 class="text-3xl font-black italic underline">📝 Post-test หลังเรียน (15 ข้อ)</h2>
                </div>
                <div id="post-quiz-list" class="bg-white p-8 rounded-b-[40px] shadow-2xl space-y-8 border-x-2 border-b-2"></div>
            </div>
        </main>
    </div>

    <div id="pdf-modal" class="fixed inset-0 bg-black/90 hidden z-50 p-4 flex flex-col">
        <div class="flex justify-end p-2"><button onclick="document.getElementById('pdf-modal').classList.add('hidden')" class="bg-white text-red-600 font-bold px-4 py-1 rounded-full">ปิด</button></div>
        <iframe id="pdf-frame" src="" class="w-full flex-1 rounded-2xl"></iframe>
    </div>

    <div id="res-modal" class="fixed inset-0 bg-blue-900/95 hidden z-50 flex items-center justify-center p-6 text-center">
        <div class="bg-white p-12 rounded-[50px] shadow-2xl max-w-sm w-full border-8 border-blue-500">
            <div id="emoji" class="text-8xl mb-4"></div>
            <h3 class="text-2xl font-black italic underline text-slate-800" id="res-type">คะแนน</h3>
            <div id="f-score" class="text-7xl font-black text-blue-600 my-6"></div>
            <p id="f-msg" class="font-bold text-slate-500 italic mb-8"></p>
            <button id="res-btn" onclick="location.reload()" class="w-full py-4 bg-slate-800 text-white rounded-2xl font-black italic underline">ตกลง</button>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwtMOVYeVv74Qwu94lh9zh6iqAekMDeFcv-yPIQU75-ImmfQcQKRc9TSN447H4ikd7WLg/exec';
        
        const allQuestions = [
            { q: "1. ตามมาตรา 23 งานทั่วไปมีเวลาทำงานปกติสูงสุดไม่เกินเท่าใด?", options: ["ก. 7 ชม./วัน และ 42 ชม./สัปดาห์", "ข. 8 ชม./วัน และ 48 ชม./สัปดาห์", "ค. 9 ชม./วัน และ 54 ชม./สัปดาห์"], correct: 1, info: "8 ชม. ต่อวัน และไม่เกิน 48 ชม. ต่อสัปดาห์" },
            { q: "2. งานประเภทใดที่กฎหมายจำกัดให้ทำงานได้ไม่เกิน 7 ชั่วโมงต่อวัน?", options: ["ก. งานเอกสาร", "ข. งานขาย", "ค. งานอันตรายตามกฎกระทรวง"], correct: 2, info: "งานที่อาจเป็นอันตรายต่อสุขภาพ" },
            { q: "3. การลาป่วยตามกฎหมายแรงงาน ลูกจ้างมีสิทธิได้รับค่าจ้างปีละไม่เกินกี่วันทำงาน?", options: ["ก. 15 วัน", "ข. 30 วัน", "ค. 45 วัน"], correct: 1, info: "ได้รับค่าจ้างไม่เกิน 30 วันทำงานต่อปี" },
            { q: "4. หากลูกจ้างทำงานครบ 1 ปี มีสิทธิหยุดพักผ่อนประจำปี (พักร้อน) ได้ไม่น้อยกว่ากี่วัน?", options: ["ก. 3 วันทำงาน", "ข. 6 วันทำงาน", "ค. 10 วันทำงาน"], correct: 1, info: "พักร้อนได้ไม่น้อยกว่า 6 วันทำงาน" },
            { q: "5. \"การตรงต่อเวลา\" ตามกฎระ備ของบริษัท ส่งผลดีอย่างไรมากที่สุด?", options: ["ก. ได้เลื่อนตำแหน่งทันที", "ข. สร้างความน่าเชื่อถือและเพิ่มประสิทธิภาพ", "ค. ไม่ต้องทำงาน OT"], correct: 1, info: "แสดงถึงความรับผิดชอบ" },
            { q: "6. หากต้องทำงานล่วงเวลา (OT) ในวันทำงานปกติ ลูกจ้างต้องได้รับค่าจ้างเพิ่มขึ้นกี่เท่า?", options: ["ก. 1 เท่า", "ข. 1.5 เท่า", "ค. 3 เท่า"], correct: 1, info: "ไม่น้อยกว่า 1.5 เท่า" },
            { q: "7. การลาประเภทใดที่ได้รับค่าจ้างไม่น้อยกว่า 3 วันทำงานต่อปี ตามกฎหมายใหม่?", options: ["ก. ลาไปรับราชการทหาร", "ข. ลากิจธุระอันจำเป็น", "ค. ลาเพื่อการฝึกอบรม"], correct: 1, info: "ลากิจธุระอันจำเป็นได้รับค่าจ้างไม่น้อยกว่า 3 วัน" },
            { q: "8. นายจ้างต้องจัดให้ลูกจ้างมีเวลาพักอย่างน้อยกี่นาที ภายใน 5 ชม. แรก?", options: ["ก. 30 นาที", "ข. 45 นาที", "ค. 1 ชั่วโมง"], correct: 2, info: "พักไม่น้อยกว่า 1 ชม." },
            { q: "9. หากเลิกจ้างโดยไม่มีความผิดร้ายแรงและไม่บอกล่วงหน้า ต้องจ่ายเงินส่วนใดเพิ่ม?", options: ["ก. ค่าล่วงเวลาสะสม", "ข. สินจ้างแทนการบอกกล่าวล่วงหน้า", "ค. ค่าเบี้ยเลี้ยงย้อนหลัง"], correct: 1, info: "สินจ้างแทนการบอกกล่าวล่วงหน้า (ค่าตกใจ)" },
            { q: "10. วัตถุประสงค์หลักของ \"กฎระเบียบองค์กร\" คืออะไร?", options: ["ก. เพื่อลงโทษ", "ข. เพื่อความเป็นระเบียบและราบรื่น", "ค. เพื่อลดค่าใช้จ่าย"], correct: 1, info: "เพื่อให้ทุกคนอยู่ร่วมกันได้" },
            { q: "11. สวัสดิการพนักงานมีไว้เพื่อวัตถุประสงค์ใดเป็นสำคัญ?", options: ["ก. เพื่อลงโทษ", "ข. เพื่อสร้างขวัญกำลังใจและคุณภาพชีวิต", "ค. เพื่อลดคน"], correct: 1, info: "เพื่อส่งเสริมคุณภาพชีวิต" },
            { q: "12. การจ่าย \"เบี้ยขยัน\" ของบริษัทมีลักษณะอย่างไร?", options: ["ก. จ่ายคงที่ 500 บาท", "ข. ขั้นบันได 300-600 บาท หากไม่ขาด ลา มาสาย", "ค. จ่ายเมื่อครบ 1 ปี"], correct: 1, info: "เริ่ม 300 สูงสุด 600 บาท" },
            { q: "13. บริษัทมีการจ่าย \"โบนัส\" บ่อยแค่ไหน?", options: ["ก. ปีละ 1 ครั้ง", "ข. ปีละ 2 ครั้ง", "ค. ทุกไตรมาส (ปีละ 4 ครั้ง)"], correct: 2, info: "จ่ายตามรอบไตรมาส" },
            { q: "14. พนักงานสามารถ \"เบิกเงินล่วงหน้า\" ได้สูงสุดไม่เกินจำนวนเท่าใด?", options: ["ก. 2,000 บาท", "ข. 3,000 บาท", "ค. 5,000 บาท"], correct: 1, info: "เบิกได้สูงสุด 3,000 บาท" },
            { q: "15. ข้อใดกล่าวถูกต้องเกี่ยวกับ \"วันหยุดตามประเพณี\"?", options: ["ก. ไม่น้อยกว่า 13 วันต่อปี", "ข. หยุดตามราชการทุกวัน", "ค. วันแรงงานไม่นับ"], correct: 0, info: "ต้องมีไม่น้อยกว่า 13 วัน" }
        ];

        let currentNickname = "", score = 0, answered = 0;

        function handleLogin(mode) {
            const n = document.getElementById('nickname-input').value;
            if(!n.trim()) return alert("ใส่ชื่อเล่นก่อนครับ");
            currentNickname = n;
            document.getElementById('display-name').innerText = n;
            document.getElementById('login-screen').classList.add('hidden');

            if(mode === 'pre') {
                document.getElementById('pre-test-screen').classList.remove('hidden');
                // สลับข้อสอบก่อนแสดงผล
                const shuffled = [...allQuestions].sort(() => 0.5 - Math.random());
                renderQuiz('pre-quiz-list', shuffled, 'pre');
            } else {
                document.getElementById('main-app').classList.remove('hidden');
                renderQuiz('post-quiz-list', allQuestions, 'post');
            }
        }

        function renderQuiz(containerId, data, type) {
            const l = document.getElementById(containerId);
            l.innerHTML = ''; score = 0; answered = 0;
            data.forEach((item, idx) => {
                const d = document.createElement('div');
                d.className = "p-6 rounded-3xl border-2 border-slate-50 space-y-4 shadow-sm";
                d.innerHTML = `<p class="font-black text-slate-800 italic underline">${item.q}</p>
                    <div class="grid grid-cols-1 gap-2" id="g-${containerId}-${idx}">
                        ${item.options.map((o, i) => `<button onclick="ck('${containerId}',${idx},${i},this,${item.correct},'${type}')" class="quiz-option p-4 rounded-2xl text-left text-sm font-bold bg-white italic">${o}</button>`).join('')}
                    </div>
                    <div id="i-${containerId}-${idx}" class="hidden p-4 bg-blue-50 text-blue-800 text-xs rounded-2xl border-l-8 border-blue-600 italic font-bold">ℹ️ คำอธิบาย: ${item.info}</div>`;
                l.appendChild(d);
            });
        }

        function ck(cid, qi, oi, b, correctIdx, type) {
            const g = document.getElementById(`g-${cid}-${qi}`);
            if(g.dataset.a) return; g.dataset.a = true;
            document.getElementById(`i-${cid}-${qi}`).classList.remove('hidden');
            if(oi === correctIdx) { b.classList.add('correct'); score++; }
            else { b.classList.add('wrong'); g.children[correctIdx].classList.add('correct'); }
            answered++;
            if(answered === 15) setTimeout(() => showRes(type), 1500);
        }

        function showRes(type) {
            const fScore = score + "/15";
            document.getElementById('f-score').innerText = fScore;
            let rating = "Pre-test";
            
            if(type === 'post') {
                const rs = document.getElementsByName('r');
                for(let r of rs) if(r.checked) rating = document.getElementById('rt').innerText;
                document.getElementById('res-type').innerText = "ผลสอบหลังเรียน";
                document.getElementById('res-btn').onclick = () => location.reload();
            } else {
                document.getElementById('res-type').innerText = "ผลสอบก่อนเรียน";
                document.getElementById('res-btn').innerText = "ไปหน้าบทเรียนต่อ";
                document.getElementById('res-btn').onclick = () => {
                    document.getElementById('res-modal').classList.add('hidden');
                    document.getElementById('pre-test-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    renderQuiz('post-quiz-list', allQuestions, 'post');
                };
            }

            const sendName = (type === 'pre') ? `[Pre] ${currentNickname}` : currentNickname;
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ nickname: sendName, score: fScore, rating: rating })
            });

            document.getElementById('emoji').innerText = (score >= 12) ? "🏆" : "👍";
            document.getElementById('f-msg').innerText = (score >= 12) ? "สุดยอดครับ!" : "พยายามต่อไปนะ!";
            document.getElementById('res-modal').classList.remove('hidden');
        }

        function updateV(url, title, btn) {
            const vLink = document.getElementById('v-link');
            vLink.href = url; vLink.classList.remove('hidden');
            document.getElementById('v-title').innerText = title;
            document.querySelectorAll('.v-btn').forEach(b => b.className = "v-btn bg-white p-4 rounded-2xl font-bold text-xs italic shadow border-2 border-transparent");
            btn.className = "v-btn bg-red-600 text-white p-4 rounded-2xl font-bold text-xs italic shadow-lg border-2 border-red-800";
        }

        function openPDF(url) {
            document.getElementById('pdf-frame').src = url;
